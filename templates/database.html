{% extends "base.html" %}

{% block head %}
    <title>Database</title>
{% endblock %}

{% block body %}
<a href="/" style="margin: 15px;"><button type="button">Home</button></a>
    <h1 style="text-align: center;">Database</h1>
    <table class="table">
        <tr>
            <th>Title</th>
            <th>Price</th>
            <th>Updated</th>
        </tr>
        {% for book in books %}
        <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.price }}</td>
            <td>
                {{ book.last_updated }}
            </td>
        </tr>
        {% endfor %}
{% endblock %}
