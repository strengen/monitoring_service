name: Tests
on:
  push:
    branches:
      - features

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

    env:
      DB_NAME = ":memory:"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r core/requirements.txt

      - name: Run tests
        run: PYTHONPATH=. pytest